{id:9006,cat:"土工",sub:"建設機械の作業能力",freq:2,q:"建設機械の作業能力・施工効率に関する次の記述のうち、適当でないものはどれか。",choices:["A: 機械の作業能力は時間当たり作業量で表される","B: 作業効率は土質・運搬距離・現場条件などにより変化する","C: ブルドーザの作業能力は土質に関係なく一定である","D: ショベル系掘削機の作業能力はバケット容量等に左右される"],ans:2,exp:"【頻出】ブルドーザの作業能力は土質・押土距離・勾配で大きく変化する。作業効率（係数）・サイクルタイムの考え方は頻出。"},
{id:9007,cat:"土工",sub:"情報化施工",freq:2,q:"TS（トータルステーション）・GNSSを用いた情報化施工に関する次の記述のうち、適当でないものはどれか。",choices:["A: ブルドーザやグレーダのブレードを自動制御できる","B: 締固め回数を色分け表示し締固め管理に活用できる","C: 丁張りを大幅に省略でき施工の効率化が図れる","D: 天候・衛星配置にかかわらず常に同一精度が得られる"],ans:3,exp:"【近年増加】GNSSは衛星配置や上空障害物の影響を受け精度が変動する。情報化施工（MC/MG・締固め管理）はICT施工普及で出題増。"},
{id:9008,cat:"土工",sub:"のり面保護工",freq:2,q:"切土・盛土のり面保護工に関する次の記述のうち、適当でないものはどれか。",choices:["A: 種子吹付工・張芝工は植生による侵食防止を目的とする","B: モルタル吹付工は風化・侵食を防ぐが地山の安定には寄与しない","C: 植生工は地山が硬く植生に適さない箇所に第一に採用する","D: コンクリート張工・ブロック積工は比較的急なのり面に用いる"],ans:2,exp:"【頻出】植生工は表土があり植物が生育できるのり面に適する。硬岩・風化岩等の植生不適箇所には構造物工（吹付け・張工）を用いる。のり面保護工の植生工/構造物工の区分は頻出。"},
{id:9009,cat:"土工",sub:"盛土の排水・締固め管理",freq:2,q:"盛土施工中の排水・締固め管理に関する次の記述のうち、適当でないものはどれか。",choices:["A: 施工中は雨水排除のため適切な横断勾配を設ける","B: のり面・小段に排水溝を設け表流水を集水・排水する","C: 含水比の高い材料は曝気乾燥や水切りで含水比を低下させる","D: 締固め管理は雨天時に行うのが最も精度が高い"],ans:3,exp:"【頻出】雨天時は含水比が上がり締固めに不適。施工中の排水処理・含水比調整（曝気乾燥等）は頻出論点。"},

// ===== コンクリート工（拡充） =====
{id:9107,cat:"コンクリート工",sub:"暑中コンクリート",freq:2,q:"暑中コンクリート（日平均気温25℃超）の施工に関する次の記述のうち、適当でないものはどれか。",choices:["A: 練混ぜから打込み終了までの時間は1.5時間以内とする","B: 打込み時のコンクリート温度は原則35℃以下とする","C: 材料を冷却するなどして練上がり温度の上昇を抑える","D: 表面を乾燥させるため打込み後の散水養生は行わない"],ans:3,exp:"【頻出】暑中は急激な乾燥でひび割れしやすく、打込み後ただちに湿潤養生を開始する。打重ね1.5時間以内・打込み温度35℃以下は頻出数値。"},
{id:9108,cat:"コンクリート工",sub:"寒中コンクリート",freq:2,q:"寒中コンクリート（日平均気温4℃以下）の施工に関する次の記述のうち、適当でないものはどれか。",choices:["A: 打込み時のコンクリート温度は5〜20℃程度を確保する","B: 養生中はコンクリート温度を5℃以上に保つ","C: 凍結融解作用を受けないようAE剤等で適切な空気量を確保する","D: 材料を加熱する際はセメントを直接火で加熱するのが効率的である"],ans:3,exp:"【頻出】セメントは直接加熱してはならない（急結・品質低下の原因）。加熱は水・骨材を対象とする。寒中の温度管理（打込み5〜20℃・養生5℃以上）は頻出。"},
{id:9109,cat:"コンクリート工",sub:"マスコンクリート",freq:2,q:"マスコンクリートの温度ひび割れ対策に関する次の記述のうち、適当でないものはどれか。",choices:["A: 中庸熱・低熱ポルトランドセメントや混合セメントを用いる","B: パイプクーリングにより内部温度の上昇を抑える","C: 単位セメント量をできるだけ多くして水和熱を高める","D: 打込み区画の分割やリフト高さの調整を行う"],ans:2,exp:"【頻出】単位セメント量を多くすると水和熱が増し温度ひび割れが助長される。低発熱化・プレクーリング・パイプクーリングが対策。"},
{id:9110,cat:"コンクリート工",sub:"品質・受入れ検査",freq:2,q:"レディーミクストコンクリートの受入れ検査に関する次の記述のうち、適当でないものはどれか。",choices:["A: スランプ8〜18cmの許容差は±2.5cmである","B: 空気量4.5%の許容差は±1.5%である","C: 圧縮強度は1回の試験結果が呼び強度の85%以上を満たす必要がある","D: 塩化物含有量の検査は行わなくてよい"],ans:3,exp:"【頻出】塩化物含有量は原則0.30kg/m³以下で検査が必要（鉄筋腐食防止）。スランプ・空気量・強度・塩化物の受入れ基準は頻出数値。"},
{id:9111,cat:"コンクリート工",sub:"鉄筋の継手",freq:2,q:"鉄筋の継手に関する次の記述のうち、適当でないものはどれか。",choices:["A: ガス圧接継手のふくらみは原則として鉄筋径の1.4倍以上とする","B: 重ね継手は所定の重ね長さを確保する","C: 継手は同一断面に集中させず相互にずらして配置する","D: 圧接面は雨天時でも特別な養生なしに施工してよい"],ans:3,exp:"【頻出】ガス圧接は降雨・降雪時は原則中止又は適切な防護を行う。ふくらみ径（1.4d以上）・継手のずらし配置は頻出。"},

// ===== 基礎工（拡充） =====
{id:9205,cat:"基礎工",sub:"場所打ち杭の孔底処理",freq:2,q:"場所打ちコンクリート杭の施工管理に関する次の記述のうち、適当でないものはどれか。",choices:["A: 掘削完了後はスライム（沈殿土砂）を除去する","B: 鉄筋かごはスペーサでかぶりを確保して建込む","C: コンクリートはトレミー管を用い管先を常にコンクリート中に保つ","D: 安定液（泥水）の比重・粘性は管理せず一定でよい"],ans:3,exp:"【頻出】安定液は孔壁保護・スライム抑制のため比重・粘性・砂分を適切に管理する。スライム処理・トレミー打設・かぶり確保は頻出。"},
{id:9206,cat:"基礎工",sub:"ケーソン基礎",freq:1,q:"ニューマチックケーソン（空気ケーソン）工法に関する次の記述のうち、適当でないものはどれか。",choices:["A: 作業室に圧縮空気を送り地下水の浸入を防ぎながら掘削する","B: 沈下関係の障害物処理や支持地盤の確認が直接行える","C: 高気圧下作業のため作業員の健康管理（潜函病対策）が重要である","D: 軟弱地盤では使用できず岩盤専用の工法である"],ans:3,exp:"【出題あり】ニューマチックケーソンは支持層確認が確実で各種地盤に適用される。オープンケーソンとの比較・高気圧障害対策は時々出題。"},
{id:9207,cat:"基礎工",sub:"土留め壁の種類",freq:2,q:"土留め壁の種類と特徴に関する次の記述のうち、適当でないものはどれか。",choices:["A: 親杭横矢板壁は地下水位の高い砂質地盤の止水に最も適する","B: 鋼矢板壁は止水性があり比較的軟弱な地盤にも用いられる","C: ソイルセメント連続壁は原位置土とセメントを撹拌して造成する","D: 地下連続壁（RC連続壁）は止水性・剛性が高く大深度に適する"],ans:0,exp:"【頻出】親杭横矢板壁は横矢板間からの漏水があり止水性に乏しく、地下水位の高い場所には不適。土留め壁の止水性・適用地盤の比較は頻出。"},

// ===== 専門土木：構造物（拡充） =====
{id:9303,cat:"専門土木",sub:"鋼橋の溶接",freq:2,q:"鋼橋の溶接接合に関する次の記述のうち、適当でないものはどれか。",choices:["A: 開先溶接（グルーブ溶接）は突合せ継手などに用いる","B: 溶接前に開先内の水分・油・さび等を除去する","C: 溶接部の欠陥検査には超音波探傷試験・放射線透過試験を用いる","D: 低温・降雨など気象条件に関係なく溶接してよい"],ans:3,exp:"【頻出】低温・降雨・強風時は溶接欠陥が生じやすく、予熱や防護等の措置・中止が必要。溶接の種類・非破壊検査・開先処理は頻出。"},
{id:9304,cat:"専門土木",sub:"PCコンクリート",freq:1,q:"プレストレストコンクリート（PC）に関する次の記述のうち、適当でないものはどれか。",choices:["A: プレテンション方式はPC鋼材を緊張した後にコンクリートを打設する","B: ポストテンション方式は硬化後にシース内のPC鋼材を緊張する","C: プレストレスにより引張応力に弱いコンクリートの欠点を補う","D: プレストレスを与えるとひび割れがかえって発生しやすくなる"],ans:3,exp:"【出題あり】プレストレスは断面に圧縮力を与え、使用時のひび割れを抑制する。プレテン/ポステンの違い・PCの原理は時々出題。"},
{id:9404,cat:"専門土木",sub:"河川樋門・仮締切",freq:1,q:"河川工事の樋門・仮締切に関する次の記述のうち、適当でないものはどれか。",choices:["A: 樋門は堤防を横断して設けるため周囲の遮水（止水矢板等）が重要である","B: 樋門底版下の空洞化・漏水（パイピング）に注意する","C: 仮締切は出水期を避けて施工計画を立てるのが原則である","D: 仮締切の高さは計画水位を考慮せず低く抑えるのがよい"],ans:3,exp:"【出題あり】仮締切は計画（施工時）水位＋余裕高を考慮した高さとする。樋門の遮水・空洞化対策・出水期回避は時々出題。"},
{id:9505,cat:"専門土木",sub:"アスファルト舗装の補修",freq:2,q:"アスファルト舗装の維持・修繕工法に関する次の記述のうち、適当でないものはどれか。",choices:["A: オーバーレイ工法は既設舗装上に新たな混合物層を舗設する","B: 打換え工法は既設舗装を撤去し新設する","C: パッチング工法は局部的な穴・くぼみを応急的に充填する","D: 表面処理工法は既設に厚い層を加える大規模補修工法である"],ans:3,exp:"【頻出】表面処理は薄い封かん層を設ける予防的・軽度の補修。各補修工法（オーバーレイ・打換え・切削・パッチング・表面処理）の規模区分は頻出。"},
{id:9506,cat:"専門土木",sub:"プライム・タックコート",freq:2,q:"アスファルト舗装のプライムコート・タックコートに関する次の記述のうち、適当でないものはどれか。",choices:["A: プライムコートは路盤と上層の付着・路盤の水分蒸発抑制を目的とする","B: タックコートは舗装層相互の付着をよくするために散布する","C: プライムコートは上層路盤の仕上げ後に散布する","D: タックコートは散布後ただちに上層を舗設するのがよい"],ans:3,exp:"【頻出】タックコートは散布後、乳剤が分解（水分が蒸発）してから舗設する。プライム（路盤上）/タック（層間）の役割は頻出。"},
{id:9603,cat:"専門土木",sub:"トンネルの観察・計測",freq:1,q:"山岳トンネルの施工時計測・観察に関する次の記述のうち、適当でないものはどれか。",choices:["A: 切羽の観察により地山状況や支保の妥当性を確認する","B: 内空変位測定・天端沈下測定を行い変状を把握する","C: 計測結果は支保パターンの修正に反映する","D: 計測は掘削完了後にまとめて1回だけ行えばよい"],ans:3,exp:"【出題あり】計測は日常的・経時的に行い、地山挙動を継続的に監視して施工にフィードバックする。NATMの観察・A計測/B計測は時々出題。"},
{id:9703,cat:"専門土木",sub:"港湾・ケーソン",freq:1,q:"港湾工事（防波堤・ケーソン）に関する次の記述のうち、適当でないものはどれか。",choices:["A: ケーソンは製作・進水・曳航・据付け・中詰めの順で施工する","B: 基礎捨石マウンドは所定の形状に均す（基礎均し）","C: 中詰め後に上部コンクリートやふたコンクリートを施工する","D: ケーソンの据付けは潮位・波浪に関係なくいつでもよい"],ans:3,exp:"【出題あり】据付けは静穏な海象（潮位・波浪）を選んで行う。ケーソンの施工手順・基礎マウンドは時々出題。"},
{id:9704,cat:"専門土木",sub:"海岸保全施設",freq:1,q:"海岸の侵食対策施設に関する次の記述のうち、適当でないものはどれか。",choices:["A: 離岸堤は汀線から離れた沖に設け波を減衰させ砂を堆積させる","B: 突堤は汀線に直角に設け沿岸漂砂を制御する","C: 人工リーフは天端を水面下に設ける潜堤である","D: 養浜は砂を供給する工法ではなく護岸構造物の一種である"],ans:3,exp:"【出題あり】養浜は人工的に砂を供給・補給して海浜を造成・回復する工法。離岸堤・突堤・人工リーフ・養浜の機能は時々出題。"},
{id:9705,cat:"専門土木",sub:"鉄道・営業線近接",freq:2,q:"鉄道の営業線近接工事に関する次の記述のうち、適当でないものはどれか。",choices:["A: 列車見張員を配置し列車の接近を作業員に知らせる","B: 建築限界・車両限界を侵さないよう施工する","C: 工事従事者は列車運行の安全を最優先に行動する","D: 列車見張員は作業に従事しながら見張りも兼務してよい"],ans:3,exp:"【頻出】列車見張員は見張りに専従し、他の作業を兼務してはならない。建築限界・営業線近接の保安体制は頻出論点。"},

// ===== 法規（拡充） =====
{id:9804,cat:"法規",sub:"労働基準法・補償",freq:1,q:"労働基準法の災害補償に関する次の記述のうち、誤っているものはどれか。",choices:["A: 労働者が業務上負傷した場合、使用者は療養補償を行う","B: 業務上の負傷・疾病による休業には休業補償を行う","C: 補償を受ける権利は労働者の退職によって変更される","D: 労災保険給付が行われるべき場合は使用者は補償の責を免れる"],ans:2,exp:"【出題あり】補償を受ける権利は退職によって変更されない。療養・休業・障害・遺族補償等の災害補償は時々出題。"},
{id:9854,cat:"法規",sub:"労働安全衛生・就業制限",freq:2,q:"労働安全衛生法上、一定の資格（免許・技能講習等）がなければ就業できない業務として、誤っているものはどれか。",choices:["A: つり上げ荷重5t以上のクレーンの運転","B: 最大荷重1t以上のフォークリフトの運転","C: つり上げ荷重1t以上の玉掛けの業務","D: 高さ1m未満の脚立を用いた軽作業"],ans:3,exp:"【頻出】高さ1m未満の脚立軽作業に就業資格は不要。クレーン・フォークリフト・玉掛け等の就業制限業務は頻出。"},
{id:9855,cat:"法規",sub:"労働安全衛生・酸欠等",freq:1,q:"酸素欠乏症等の防止に関する次の記述のうち、誤っているものはどれか。",choices:["A: 酸素欠乏危険場所では作業前に酸素濃度を測定する","B: 酸素濃度18%以上を保つよう換気する","C: 酸素欠乏危険作業には作業主任者を選任する","D: 換気が困難でも送気マスク等の保護具は不要である"],ans:3,exp:"【出題あり】換気できない場合は送気マスク・空気呼吸器等を使用させる（防毒マスクは不可）。酸素18%以上・測定・作業主任者は時々出題。"},
{id:9874,cat:"法規",sub:"建設業法・施工体制",freq:2,q:"施工体制台帳・施工体系図に関する建設業法上の次の記述のうち、誤っているものはどれか。",choices:["A: 一定額以上を下請契約した特定建設業者は施工体制台帳を作成する","B: 施工体系図は各下請の施工分担関係を表示する","C: 施工体制台帳は工事目的物の引渡し後ただちに廃棄してよい","D: 公共工事では発注者から請求がなくても写しの提出等が求められる"],ans:2,exp:"【頻出】施工体制台帳・関係書類は工事完成後一定期間（原則5年・公共は10年の場合も）保存する。台帳作成義務・施工体系図の掲示は頻出。"},
{id:9875,cat:"法規",sub:"建設業法・技術者職務",freq:2,q:"主任技術者・監理技術者の職務に関する建設業法上の次の記述のうち、誤っているものはどれか。",choices:["A: 施工計画の作成・工程管理・品質管理等の技術上の管理を行う","B: 工事の施工に従事する者を技術上指導監督する","C: 専任の技術者は原則として常時継続して当該現場に専任する","D: 監理技術者は複数の現場をいつでも自由に兼任できる"],ans:3,exp:"【頻出】専任の監理技術者は原則兼任不可（補佐を専任で置く場合に限り2現場兼務可の特例）。技術者の職務・専任義務は頻出。"},

const cats = ['全カテゴリ',...Array.from(new Set(questions.map(q=>q.cat)))];
const flashCats = ['全カテゴリ',...Array.from(new Set(flashcards.map(c=>c.cat)))];

function getFiltered(){
  let qs = questions;
  if(S.catFilter!=='全カテゴリ') qs = qs.filter(q=>q.cat===S.catFilter);
  if(S.qMode==='wrong') qs = qs.filter(q=>S.answered[q.id]&&!S.answered[q.id].correct);
  else if(S.qMode==='bookmark') qs = qs.filter(q=>S.bookmarks[q.id]);
  else if(S.qMode==='unanswered') qs = qs.filter(q=>!S.answered[q.id]);
  return qs;
}
function getStats(){
  const ids = Object.keys(S.answered);
  const t = ids.length;
  const c = ids.filter(id=>S.answered[id].correct).length;
  return{total:t,correct:c,pct:t>0?Math.round(c/t*100):0};
}
function getCatStats(){
  const out={};
  cats.slice(1).forEach(c=>{
    const inCat = questions.filter(q=>q.cat===c);
    const ans = inCat.filter(q=>S.answered[q.id]);
    const corr = ans.filter(q=>S.answered[q.id].correct);
    out[c] = {total:inCat.length, answered:ans.length, correct:corr.length, pct:ans.length>0?Math.round(corr.length/ans.length*100):0};
  });
  return out;
}
function todayKey(){const d=new Date();return d.toISOString().slice(0,10);}

function fmtTime(sec){
  if(sec<0)sec=0;
  const m=Math.floor(sec/60), s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

      <div class="q-meta">
        <span class="q-cat">${q.cat}</span>
        <span class="q-id">問${S.mockCurrent+1}</span>
        <button class="bookmark-btn ${flagged?'bookmark-on':''}" onclick="flagMock(${q.id})" title="後で見直す">🚩</button>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="q-choices">
        ${q.choices.map((c,i)=>{

    </div>
  </div>
  <div class="side-panel">
    <div class="card">
      <div class="card-title" style="font-size:13px">問題ナビ</div>
      <div class="mock-nav-grid">
        ${S.mockQs.map((mq,i)=>{
          const isAns = S.mockAnswers[mq.id]!==undefined;
          const isFlag = S.mockFlags[mq.id];
          const isCur = i===S.mockCurrent;
          const cls = isCur?'cur':(isFlag?'flag':(isAns?'ans':''));

    ${Object.keys(catBreak).map(cat=>{
      const b = catBreak[cat];
      const p = b.t>0?Math.round(b.c/b.t*100):0;

        <span class="mock-cat-name">${cat}</span>

      ${conf.guess>0?`<div style="width:${conf.guess/confTotal*100}%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700">${conf.guess}</div>`:''}

  // 1. イントロ
  if(isFirstInCat){
    s += `それでは、${catName}の解説を始めましょう。 最初の項目は、${cleanTitle}、です。 `;
  } else {
    const intros = [
      `続いては、${cleanTitle}、について見ていきます。 `,
      `次は、${cleanTitle}、です。 `,
      `お次は、${cleanTitle}、について解説します。 `,
    ];
    s += intros[cleanTitle.length%intros.length];
  }
  // 2. 必須項目アピール
  if(item.must){
    s += 'こちら、頻出の最重要項目です。 しっかり押さえてください。 ';
  }
  // 3. 数値導入
  const numIntros = [
    'まず、覚えるべき数値を確認しましょう。 ',
    'まずは、重要な数値からです。 ',
    '数値はこちらです。 ',
  ];
  s += numIntros[cleanTitle.length%numIntros.length];
  // 4. 本文（行ごとに区切る）
  const contentLines = item.content.split('\n').filter(l=>l.trim());
  contentLines.forEach(line=>{
    s += sanitizeForSpeech(line) + '。 ';
  });
  // 5. 必須項目への強調フレーズ
  if(item.must){
    const emphasis = [
      'ここ、過去問でも頻出です。 ',
      'この数値、絶対に間違えないように。 ',
      '数字を、しっかり覚えてください。 ',
      '試験で必ず問われるポイントです。 ',
    ];
    s += emphasis[cleanTitle.length%emphasis.length];
  }
  // 6. 解説
  if(item.expl){
    s += 'それでは、解説していきます。 ';
    // 解説を句点で区切って、間が自然に入るようにする
    const explSentences = item.expl.split(/[。．]/).map(x=>x.trim()).filter(x=>x.length>0);
    explSentences.forEach(sent=>{
      s += sanitizeForSpeech(sent) + '。 ';
    });
  }
  // 7. アウトロ
  if(isLastInCat){
    s += `以上で、${catName}、の解説を終わります。 お疲れさまでした。`;
  } else {
    s += `以上、${cleanTitle}、の解説でした。`;
  }
  return s;
}
function sanitizeForSpeech(text){
  return text
    .replace(/★必須★/g,'、最重要')
    .replace(/★/g,'')
    .replace(/\n/g,'。 ')
    .replace(/[|｜]/g,'、 ')
    .replace(/[（(]/g,'、')
    .replace(/[）)]/g,'、')
    .replace(/[【】「」『』]/g,' ')
    .replace(/≥/g,'以上 ')
    .replace(/≤/g,'以下 ')
    .replace(/＜/g,'未満')
    .replace(/＞/g,'を超える')
    .replace(/<(\s*\d)/g,'$1未満')
    .replace(/>(\s*\d)/g,'$1超')
    .replace(/＝/g,'は ')
    .replace(/＋/g,' プラス ')
    .replace(/W\/C/g,'ダブリューシー')
    .replace(/N値/g,'エヌ値')
    .replace(/Cp/g,'シーピー')
    .replace(/Cpk/g,'シーピーケー')
    .replace(/Dc/g,'ディーシー')
    .replace(/PI/g,'ピーアイ')
    .replace(/LL/g,'エルエル')
    .replace(/PL/g,'ピーエル')
    .replace(/Uc/g,'ユーシー')
    .replace(/UCL/g,'ユーシーエル')
    .replace(/LCL/g,'エルシーエル')
    .replace(/TF/g,'ティーエフ')
    .replace(/FF/g,'エフエフ')
    .replace(/LF/g,'エルエフ')
    .replace(/EF/g,'イーエフ')
    .replace(/LS/g,'エルエス')
    .replace(/ES/g,'イーエス')
    .replace(/CP/g,'クリティカルパス')
    .replace(/γd/g,'ガンマD')
    .replace(/γdmax/g,'ガンマDマックス')
    .replace(/σ/g,'シグマ')
    .replace(/X̄/g,'エックスバー')
    .replace(/㎡/g,'平方メートル')
    .replace(/m³/g,'立方メートル')
    .replace(/m²/g,'平方メートル')
    .replace(/㎏/g,'キログラム')
    .replace(/℃/g,'度')
    .replace(/dB/g,'デシベル')
    .replace(/φ/g,'直径')
    .replace(/(\d)mm/g,'$1ミリ')
    .replace(/(\d)cm/g,'$1センチ')
    .replace(/(\d)m\b/g,'$1メートル')
    .replace(/(\d)kg/g,'$1キログラム')
    .replace(/(\d)t\b/g,'$1トン')
    .replace(/(\d)h\b/g,'$1時間')
    .replace(/(\d)%/g,'$1パーセント')
    .replace(/H?B種/g,'ビー種')
    .replace(/PC/g,'ピーシー')
    .replace(/RC/g,'アールシー')
    .replace(/AE/g,'エーイー')
    .replace(/[／/]/g,'、 ')
    .replace(/(\d)〜(\d)/g,'$1から$2')
    .replace(/・/g,'、')
    .replace(/、\s*、/g,'、')
    .replace(/。\s*。/g,'。')
    .replace(/([。、])\s*/g,'$1 ')
    ;
}
function estimateSpeechSec(text, rate){
  // 日本語は約7文字/秒（標準速度）目安、rate補正
  const chars = text.length;
  const baseRate = 7;
  return Math.ceil(chars / (baseRate * (rate||1)));
}

// 講師風セグメント生成：イントロ→タイトル→数値（ゆっくり低めピッチ）→強調（高めピッチ）→解説→アウトロ
function buildLectureSegments(item, catName, isFirstInCat, isLastInCat){
  const segs = [];
  const cleanTitle = item.title.replace(/★必須★/g,'').trim();
  // 1. イントロ
  if(isFirstInCat){
    segs.push({text:`それでは、${catName}の解説を始めましょう。最初の項目は、${cleanTitle}、です。`, pitch:1.05, rateMul:0.95});
  } else {
    const intros = [
      `続いては、${cleanTitle}、について見ていきます。`,
      `次は、${cleanTitle}、です。`,
      `お次は、${cleanTitle}、について解説します。`,
    ];
    segs.push({text:intros[item.title.length%intros.length], pitch:1.05, rateMul:0.95});
  }
  // 2. 必須項目アピール
  if(item.must){
    segs.push({text:'こちら、頻出の最重要項目です。しっかり押さえてください。', pitch:1.15, rateMul:0.9});
  }
  // 3. 数値導入
  const numIntros = [
    'まず、覚えるべき数値を確認しましょう。',
    'まずは、重要な数値からです。',
    '数値はこちらです。',
  ];
  segs.push({text:numIntros[item.title.length%numIntros.length], pitch:1.0, rateMul:1.0});
  // 4. 本文（数値部分、ゆっくり・少し低めピッチで聞き取りやすく）
  const contentLines = item.content.split('\n').filter(l=>l.trim());
  contentLines.forEach((line,li)=>{
    const cleanLine = sanitizeForLecture(line);
    segs.push({text:cleanLine+'。', pitch:0.95, rateMul:0.88});
  });
  // 5. 強調フレーズ（必須項目のみ）
  if(item.must){
    const emphasis = [
      'ここ、過去問でも頻出です。',
      'この数値、絶対に間違えないように。',
      '数字を、しっかり覚えてください。',
      '試験で必ず問われるポイントです。',
    ];
    segs.push({text:emphasis[item.title.length%emphasis.length], pitch:1.15, rateMul:0.9});
  }
  // 6. 解説
  if(item.expl){
    segs.push({text:'それでは、解説していきます。', pitch:1.0, rateMul:1.0});
    // 解説を句点で分割し、それぞれを別セグメントに（自然な間ができる）
    const explSentences = item.expl.split(/[。．]/).map(s=>s.trim()).filter(s=>s.length>0);
    explSentences.forEach(sent=>{
      segs.push({text:sanitizeForLecture(sent)+'。', pitch:1.0, rateMul:1.0});
    });
  }
  // 7. アウトロ
  if(isLastInCat){
    segs.push({text:`以上で、${catName}、の解説を終わります。お疲れさまでした。`, pitch:1.05, rateMul:0.95});
  } else {
    segs.push({text:`以上、${cleanTitle}、の解説でした。`, pitch:1.0, rateMul:0.95});
  }
  return segs;
}

// チェーン再生：セグメントを順次発話。バージョン管理でキャンセル耐性確保
let speechVersion = 0;
function speakSegments(segments, onAllEnd){
  if(!('speechSynthesis' in window)){
    toast('お使いのブラウザは音声合成に未対応です');
    if(onAllEnd)onAllEnd();
    return false;
  }
  speechVersion++;
  const myVersion = speechVersion;
  let i = 0;
  function next(){
    if(myVersion !== speechVersion) return; // キャンセル済
    if(i >= segments.length){if(onAllEnd)onAllEnd();return;}
    if(!S.lecturePlaying){if(onAllEnd)onAllEnd();return;}
    const seg = segments[i++];
    const u = new SpeechSynthesisUtterance(seg.text);
    u.lang = 'ja-JP';
    u.rate = (S.lectureSpeed||1.0) * (seg.rateMul||1.0);
    u.pitch = seg.pitch||1.0;
    u.volume = 1.0;
    const v = getJaVoice();
    if(v) u.voice = v;
    u.onend = next;
    u.onerror = next;
    currentUtterance = u;
    speechSynthesis.speak(u);
  }
  try{ speechSynthesis.cancel(); }catch(e){}
  // キャンセル反映を待ってから開始（iOS対策）
  setTimeout(next, 120);
  return true;
}

// 音声品質の推定スコア（高いほど自然・高品質）
function rankVoiceQuality(v){
  const n=(v.name||'').toLowerCase();
  let score=0;
  if(n.includes('siri')) score+=120;                 // iOS Siri音声（最も自然）
  if(n.includes('neural')) score+=110;                // ニューラル音声
  if(n.includes('premium')) score+=100;               // プレミアム
  if(n.includes('enhanced')||n.includes('拡張')||n.includes('強化')) score+=90; // 拡張音声
  if(n.includes('eloquence')) score-=30;              // 旧式・機械的
  if(n.includes('compact')) score-=60;                // コンパクト（低品質）
  // 既知の標準音声
  if(n.includes('o-ren')) score+=35;
  if(n.includes('hattori')) score+=30;
  if(n.includes('kyoko')||n.includes('otoya')) score+=20;
  if(n.includes('google')) score+=50;                 // Google音声は比較的自然
  if(v.localService) score+=15;                       // オフライン動作（電車向き）を優遇
  return score;
}
function getJaVoice(){
  if(!('speechSynthesis' in window))return null;
  const voices = getJaVoices();
  if(voices.length===0) return null;
  // 1. ユーザーが明示的に選択した音声を最優先
  if(S.lectureVoiceURI){
    const chosen = voices.find(v=>v.voiceURI===S.lectureVoiceURI);
    if(chosen) return chosen;
  }
  // 2. 品質スコアで自動選択（高品質音声を優先）
  const sorted = voices.slice().sort((a,b)=>rankVoiceQuality(b)-rankVoiceQuality(a));
  return sorted[0];
}

let audioSessionVersion = 0;  // セッション識別子（cancel時に切替）
function speakAsync(text, opts){
  return new Promise(resolve=>{
    if(!('speechSynthesis' in window)){resolve();return;}
    try{ speechSynthesis.cancel(); }catch(e){}
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = (opts&&opts.rate) || (S.lectureSpeed||1.0);
    u.pitch = (opts&&opts.pitch) || 1.0;
    u.volume = 1.0;
    const v = getJaVoice();
    if(v) u.voice = v;
    u.onend = resolve;
    u.onerror = resolve;
    setTimeout(()=>speechSynthesis.speak(u), 80);
  });
}

async function playFlashCardAudio(startIdx, session){
  const list = getFlashAudioList();
  let i = startIdx;
  while(i < list.length){
    if(session !== audioSessionVersion || !S.flashAudioPlaying) return;
    S.flashAudioIdx = i;
    const card = list[i];
    // Read question
    document.body.dataset.fapState = 'question';
    render();
    await speakAsync(`第${i+1}問。${sanitizeForSpeech(card.q)}。`);
    if(session !== audioSessionVersion || !S.flashAudioPlaying) return;
    // Silence with countdown
    S.flashAudioCountdown = S.flashAudioSilenceSec;
    document.body.dataset.fapState = 'silence';
    render();
    for(let sec = S.flashAudioSilenceSec; sec > 0; sec--){
      if(session !== audioSessionVersion || !S.flashAudioPlaying) return;
      S.flashAudioCountdown = sec;
      // light visual update only
      const el = document.querySelector('.fap-countdown');
      if(el) el.textContent = sec;
      await waitMs(1000);
    }
    if(session !== audioSessionVersion || !S.flashAudioPlaying) return;
    // Read answer
    document.body.dataset.fapState = 'answer';
    render();
    await speakAsync(`答えは、${sanitizeForSpeech(card.a)}、です。`, {pitch:1.1});
    if(session !== audioSessionVersion || !S.flashAudioPlaying) return;
    // Mark as played (auto-known if user wants - we don't auto-mark, leave to user)
    // Brief pause before next
    await waitMs(900);
    i++;
  }
  // End of list
  if(session === audioSessionVersion){
    S.flashAudioPlaying = false;
    toast('🎉 全カード再生完了しました');
    render();
  }
}

function buildMissionScript(){
  const td = getTodayDay();
  if(td===null || td<1){
    return 'おはようございます。 本日は学習計画の開始前です。 準備期間として、最重要ポイントの予習をお勧めします。';
  }
  if(td > 30){
    return 'お疲れさまでした。 30日プログラムは完了しています。 本番に向けて、最終調整に取り組みましょう。';
  }
  const day = allDays.find(d=>d.day===td);
  if(!day) return 'おはようございます。 今日も学習を始めましょう。';
  const phase = phases.find(p=>p.id===day.phaseId);
  const remain = Math.max(0,Math.ceil((EXAM-new Date())/86400000));
  let s = `おはようございます。 今日は、DAY ${td}、`;
  if(phase) s += `${phase.name.replace(/[：:]/,'、')}、 です。 `;
  s += `試験まで、残り${remain}日。 `;
  s += `本日の学習目標は、${day.tasks.length}つあります。 `;
  day.tasks.slice(0,3).forEach((t,i)=>{
    s += `${i+1}つ目、${t}。 `;
  });
  if(day.tasks.length>3){
    s += `その他、${day.tasks.length-3}項目があります。 `;
  }
  s += `想定学習時間は、約${day.hours}時間です。 `;
  if(day.priority==='S' || day.priority==='high'){
    s += '今日は最重要レベルの内容です。 集中して取り組みましょう。';
  } else if(day.priority==='A' || day.priority==='mid'){
    s += 'マイペースで、しっかり進めましょう。';
  } else {
    s += '無理のない範囲で、進めてください。';
  }
  return s;
}

function playLectItem(idx){
  const cat = mustPoints.find(p=>p.cat===S.lectureCat);
  if(!cat)return;
  const items = cat.items;
  if(idx<0 || idx>=items.length)return;
  S.lectureIdx = idx;
  S.lecturePlaying = true;
  const item = items[idx];
  const isFirst = (idx===0);
  const isLast = (idx===items.length-1);
  const onEnd = ()=>{
    // mark as played
    S.lecturePlayed[cat.cat+'::'+item.title] = true;
    save();
    // auto-advance if still playing
    if(S.lecturePlaying){
      if(idx+1 < items.length){
        setTimeout(()=>playLectItem(idx+1), 600);
      } else {
        // end of category
        S.lecturePlaying = false;
        toast('🎉 このカテゴリの全項目を再生完了しました');
        render();
      }
    } else {
      render();
    }
  };
  let totalSec;
  // B版：常に単一発話。リッチな講師風スクリプトを生成して読み上げる
  const script = buildLectureScript(item, cat.cat, isFirst, isLast);
  totalSec = estimateSpeechSec(script, S.lectureSpeed);
  speakText(script, onEnd);
  render();
  // pulse progress bar while speaking (visual)
  let prog = 0;
  const startedAt = Date.now();
  const progTimer = setInterval(()=>{
    if(!S.lecturePlaying || S.lectureIdx!==idx){clearInterval(progTimer);return;}
    const elapsed = (Date.now()-startedAt)/1000;
    prog = Math.min(95, (elapsed/totalSec)*100);
    const bar = document.getElementById('lect-bar');
    if(bar) bar.style.width = prog+'%';
    if(prog>=95) clearInterval(progTimer);
  }, 500);
}

function getYosouStats(){
  const ids = Object.keys(S.yosouAnswered);
  const t = ids.length;
  const c = ids.filter(id=>S.yosouAnswered[id].correct).length;
  return {total:t, correct:c, pct:t>0?Math.round(c/t*100):0, all:yosouAll.length};
}
function getYosouCatStats(){
  const out={};
  yosouCats.slice(1).forEach(cat=>{
    const qs = yosouAll.filter(q=>q.cat===cat);
    const ans = qs.filter(q=>S.yosouAnswered[q.id]);
    const cor = ans.filter(q=>S.yosouAnswered[q.id].correct);
    out[cat]={total:qs.length, answered:ans.length, correct:cor.length, pct:ans.length>0?Math.round(cor.length/ans.length*100):0};
  });
  return out;
}
function getDangerList(){

// ---- Yosou handlers ----
function setYosouView(v){ S.yosouView=v; S.yosouSelected=null; S.yosouShowExp=false; render(); }

// 過去問解説オーディオ：問題文＋選択肢＋正答＋解説をB版の語り口で読み上げ
function buildYosouAudioScript(q){
  let s = `${q.cat}、${q.sub}の問題です。 ${freqLabel(q.freq)}の論点。 `;
  s += sanitizeForSpeech(q.q) + ' ';
  s += '選択肢。 ';
  q.choices.forEach((ch,i)=>{
    s += `${String.fromCharCode(65+i)}、${sanitizeForSpeech(ch.replace(/^[A-D]:\s*/,''))}。 `;
  });
  s += `正解は、${String.fromCharCode(65+q.ans)}。 `;
  s += 'それでは解説です。 ' + sanitizeForSpeech(q.exp);
  return s;
}
async function playYosouAudio(){
  const qs = getYosouFiltered();
  if(qs.length===0)return;
  if(S.yosouAudioPlaying){ stopYosouAudio(); return; }
  S.yosouAudioPlaying = true;
  const session = newAudioSession();
  render();
  // 現在の問題を解答済みにして読み上げ（解説を表示した状態にする）
  const q = qs[Math.min(S.yosouIdx, qs.length-1)];
  if(!S.yosouAnswered[q.id]){
    S.yosouShowExp = true; S.yosouSelected = q.ans;
  }
  const script = buildYosouAudioScript(q);
  await speakAsync(script);
  if(session !== audioSessionVersion) return;
  S.yosouAudioPlaying = false;
  toast('解説の読み上げが完了しました');
  render();
}
function stopYosouAudio(){
  audioSessionVersion++;
  try{ speechSynthesis.cancel(); }catch(e){}
  S.yosouAudioPlaying = false;
  render();
}
function answerYosou(qid,picked){
  const q=yosouAll.find(x=>x.id===qid);
  if(!q)return;
  // 既に解答表示中なら何もしない（誤タップ防止）。未解答時のみ記録
  if(S.yosouShowExp && S.yosouSelected!==null) return;
  S.yosouSelected=picked;
  S.yosouShowExp=true;
  S.yosouAnswered[qid]={correct:picked===q.ans, picked:picked};
  save();
  render();
}

function jumpToYosou(qid){
  // ダッシュボードから該当問題へジャンプ（全問モードに切替えて表示）
  S.yosouView='quiz';
  S.yosouCat='全分野'; S.yosouFreq='all'; S.yosouMode='all';
  const qs=getYosouFiltered();
  const idx=qs.findIndex(q=>q.id===qid);
  if(idx>=0){
    S.yosouIdx=idx;
    // 既に解答済みなら解説も表示
    const a=S.yosouAnswered[qid];
    if(a){ S.yosouSelected=a.picked; S.yosouShowExp=true; }
    else { S.yosouSelected=null; S.yosouShowExp=false; }
  }
  render();
}
function reviewYosouDanger(){
  // 危険問題（間違い＋勘）を間違えた問題モードで復習。勘問題は回答履歴をクリアして再挑戦させる
  const danger = getDangerList();
  danger.forEach(d=>{
    if(d.reason==='guess'){
      // 勘で正解した問題は未回答に戻して再挑戦
      delete S.yosouAnswered[d.q.id];
      delete S.yosouConfidence[d.q.id];
    }
  });
  S.yosouView='quiz';
  S.yosouCat='全分野'; S.yosouFreq='all'; S.yosouMode='wrong';
  S.yosouIdx=0; S.yosouSelected=null; S.yosouShowExp=false;
  save();
  // wrongモードで該当が無ければ未回答モードに
  if(getYosouFiltered().length===0){ S.yosouMode='unanswered'; }
  toast('危険問題を復習モードで表示します');
  render();
}
function resetYosouProgress(){
  if(!confirm('予想問題の解答履歴・手応え記録をすべてリセットしますか？'))return;
  S.yosouAnswered={};
  S.yosouConfidence={};
  S.yosouIdx=0; S.yosouSelected=null; S.yosouShowExp=false;
  save();
  toast('予想問題の成績をリセットしました');
  render();
}

// ---- Mock exam handlers ----
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function startMock(type){
  S.mockType=type;
  S.mockAnswers={}; S.mockFlags={}; S.mockCurrent=0;
  if(type==='am'){
    // 40問: balanced sampling across all categories
    const pool = shuffle(questions);
    S.mockQs = pool.slice(0,40);
    S.mockTimeLeft = 150*60;
  } else if(type==='pm'){
    // 26問: focus on 施工管理/安全/法規/環境
    const focus = questions.filter(q=>['施工管理','安全管理','建設業法','環境・法規'].includes(q.cat));
    const others = questions.filter(q=>!['施工管理','安全管理','建設業法','環境・法規'].includes(q.cat));
    const pool = shuffle(focus).slice(0,20).concat(shuffle(others).slice(0,6));
    S.mockQs = shuffle(pool);
    S.mockTimeLeft = 120*60;
  } else {
    S.mockQs = shuffle(questions);
    S.mockTimeLeft = 0; // no limit
  }
  S.mockState='running';
  S.mockStart=Date.now();
  render();
}
function submitMockAnswer(qid,picked){
  S.mockAnswers[qid]=picked;
  render();
}
function flagMock(qid){
  if(S.mockFlags[qid]) delete S.mockFlags[qid];
  else S.mockFlags[qid]=true;
  render();
}
function navigateMock(dir){
  const n=S.mockQs.length;
  S.mockCurrent=Math.max(0,Math.min(n-1,S.mockCurrent+dir));
  render();
}
function navigateMockTo(i){
  S.mockCurrent=i;
  render();
}
function finishMock(){
  const answered = Object.keys(S.mockAnswers).length;
  const total = S.mockQs.length;
  if(answered<total){
    if(!confirm(`未回答が${total-answered}問あります。採点しますか？`))return;
  }
  S.mockState='result';
  // record study time
  if(S.mockStart){
    const min = Math.round((Date.now()-S.mockStart)/60000);
    if(min>0) addStudyMin(min);
  }
  render();
}
function reviewMockWrong(){
  // jump to quiz tab with wrong-only filter (mock wrong → add to S.answered as wrong)
  S.mockQs.forEach(q=>{
    const a=S.mockAnswers[q.id];
    if(a!==undefined){
      S.answered[q.id]={correct:a===q.ans, picked:a};
    }
  });
  S.qMode='wrong';
  S.catFilter='全カテゴリ';
  S.qIndex=0; S.selected=null; S.showExp=false;
  S.tab='quiz';
  S.mockState='idle';
  save();
  toast('間違えた問題を演習タブに展開しました');
  render();
}
function mockTick(){
  if(S.mockState!=='running')return;
  if(S.mockType==='full')return; // no time limit
  S.mockTimeLeft--;
  if(S.mockTimeLeft<=0){
    S.mockTimeLeft=0;
    alert('⏰ 試験時間終了です。自動採点します。');
    finishMock();
    return;
  }
  // only update HUD digits (avoid full re-render every second)
  const t = document.querySelector('.mock-timer');
  if(t){
    t.textContent = '⏱ '+fmtTime(S.mockTimeLeft);
    if(S.mockTimeLeft<300) t.classList.add('mock-timer-warn');
  }
}

// ---- Pomodoro handlers ----
function setPomoMode(m){
  if(S.pomoRunning) return; // cannot switch while running
  S.pomoMode=m;
  S.pomoLeftMs = (m==='work'?25:5)*60*1000;
  render();
}
function togglePomo(){
  if(S.pomoRunning){
    // pause
    S.pomoLeftMs = Math.max(0,S.pomoEndAt-Date.now());
    S.pomoRunning=false;
  } else {
    // start
    S.pomoEndAt = Date.now()+S.pomoLeftMs;
    S.pomoRunning=true;
    // request notification permission
    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission();
    }
  }
  render();
}
function resetPomo(){
  S.pomoRunning=false;
  S.pomoLeftMs = (S.pomoMode==='work'?25:5)*60*1000;
  render();
}
function pomoTick(){
  if(!S.pomoRunning)return;
  const left = S.pomoEndAt - Date.now();
  if(left<=0){
    // complete
    S.pomoRunning=false;
    if(S.pomoMode==='work'){
      S.pomoCount++;
      S.pomoTotalMin += 25;
      addStudyMin(25);
      notify('🎯 集中タイム完了！5分休憩しましょう');
      S.pomoMode='break';
      S.pomoLeftMs = 5*60*1000;
    } else {
      notify('☕ 休憩終了！次の集中タイムへ');
      S.pomoMode='work';
      S.pomoLeftMs = 25*60*1000;
    }
    save();
    if(S.tab==='pomo') render();
    return;
  }
  // update display lightly if on pomo tab
  if(S.tab==='pomo'){
    const sec = Math.ceil(left/1000);
    const m = Math.floor(sec/60), s = sec%60;
    const el = document.querySelector('.pomo-time-num');
    if(el) el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    // update ring
    const totalMs = S.pomoMode==='work'?25*60*1000:5*60*1000;
    const pct = (1-left/totalMs)*100;
    const ring = document.querySelectorAll('.pomo-ring circle')[1];
    if(ring){
      const c = 2*Math.PI*92;
      ring.setAttribute('stroke-dashoffset', c*(1-pct/100));
    }
  }
  // sidebar mini display
  const mini = document.getElementById('pomo-mini');
  if(mini){
    const sec = Math.ceil(left/1000);
    const m = Math.floor(sec/60), s = sec%60;
    mini.textContent = (S.pomoMode==='work'?'🎯 ':'☕ ')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
}
function notify(msg){
  toast(msg);
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification('土木施工管理技士 学習',{body:msg, icon:''}); }catch(e){}
  }
}

// ---- Cheat sheet ----
function setCsCat(c){ S.csCat=c; render(); }

// ---- Countdown tick ----
function tick(){
  const now=new Date();
  const diff=EXAM-now;
  const days=Math.floor(diff/(1000*60*60*24));
  const hrs=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const mins=Math.floor((diff%(1000*60*60))/(1000*60));
  const dEl=document.getElementById('cd-days');
  const hEl=document.getElementById('cd-hms');
  if(dEl) dEl.textContent = days>0?days:0;
  if(hEl) hEl.textContent = (days>=0?String(hrs).padStart(2,'0')+':'+String(mins).padStart(2,'0'):'00:00');
}

// ---- Init ----
load();
render();
tick();
setInterval(tick,30000);
setInterval(pomoTick,1000);
setInterval(mockTick,1000);

// Speech synthesis voices may load asynchronously — re-render lecture tab once they arrive
if('speechSynthesis' in window){
  // trigger initial load
  speechSynthesis.getVoices();
  speechSynthesis.addEventListener('voiceschanged', function(){
    if(S.tab==='lecture') render();
  });
  // also cancel speech when page hidden (mobile safety)
  document.addEventListener('visibilitychange', function(){
    if(document.hidden && S.lecturePlaying){
      // keep playing in background as long as iOS allows; do nothing here
    }
  });
}

// auto-save memo on input
document.addEventListener('input',function(e){
  if(e.target.classList && e.target.classList.contains('memo-input')){
    const qid = parseInt(e.target.dataset.qid);
    if(!isNaN(qid)) saveMemo(qid, e.target.value);
  }
});

</script>
